# GalamseyWatch v6 — change detection (2016 vs 2022 bitemporal pairs).
#
# Each sample has TWO images: 2016 RGB + 2022 RGB of the same location.
# The model learns to identify what's NEW — mining that appeared between
# the two years. Ground truth = 2022 mask minus 2016 mask.
#
# Uses RGB composites (per v4 finding) and cheap eval config (per §3.7.k).

project_name: "galamsey-v6-changedetect"
model_name: "lfm2.5-VL-450M"
training_type: "vlm_sft"

dataset:
  path: "/galamsey/data/v6/galamsey_v6_multitask_train.jsonl"
  type: "vlm_sft"
  test_size: 0.01
  image_root: "/galamsey/data/v6/images"

training_config:
  extends: "DEFAULT_VLM_SFT"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 2e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  eval_on_start: true
  eval_strategy: "steps"
  eval_steps: 999999
  save_strategy: "epoch"
  logging_steps: 10

peft_config:
  extends: "DEFAULT_VLM_LORA"
  use_peft: false

benchmarks:
  max_new_tokens: 256
  image_root: "/galamsey/data/v6/images"
  benchmarks:
    - name: "galamsey_change_description"
      path: "/galamsey/data/v6/galamsey_v6_description_eval.jsonl"
      metric: "bleu"
      max_new_tokens: 256
      limit: 300

    - name: "galamsey_change_grounding_iou50"
      path: "/galamsey/data/v6/galamsey_v6_grounding_eval.jsonl"
      metric: "grounding_iou"
      iou_threshold: 0.5
      max_new_tokens: 256
      limit: 300

    - name: "galamsey_change_grounding_iou25"
      path: "/galamsey/data/v6/galamsey_v6_grounding_eval.jsonl"
      metric: "grounding_iou"
      iou_threshold: 0.25
      max_new_tokens: 256
      limit: 300

modal:
  app_name: "galamsey-v6-changedetect"
  gpu: "H100"
  timeout: 7200
  output_volume: "galamsey"
  output_dir: "/galamsey"
  detach: false
