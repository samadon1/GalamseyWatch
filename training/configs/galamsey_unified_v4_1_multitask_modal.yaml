# GalamseyWatch unified v4.1 — MULTITASK LoRA, REBALANCED mixture.
#
# v4 (1,327 rows: 327 action + 500 grounding + 500 description, action 24.6%):
#   - perception preserved at v9-e3 quality (mIoU 0.335 vs 0.337, BLEU 33.0 vs 34.1)
#   - action accuracy 69.7% on 99-tile holdout (down 7.1pp from v3's 76.8%)
#
# Diagnosis: 1000 perception examples drowned the action signal. v9-e3 already
# knows perception well — we don't need 1000 fresh examples to teach it, just
# enough to keep the LoRA from overwriting that knowledge.
#
# v4.1 (577 rows: 327 action + 125 grounding + 125 description, action 56.7%):
# perception subset acts as a regularizer, action is the dominant signal.
# Hypothesis: action recovers most of the v3 gap while perception holds.
#
# Same r=16 / alpha=32 / lr=2e-5 / 15 epochs as v3 + v4 — only data ratio differs.

project_name: "galamsey-unified-v4-1-multitask-lora"
model_name: "/galamsey/lfm2.5-VL-450M-vlm_sft-galamsey_v-all-lr2em05-w0p0-no_lora-20260418_165633/lfm2.5-VL-450M-vlm_sft-galamsey_v-all-lr2em05-w0p0-no_lora-e3s35439-20260418_165633"
training_type: "vlm_sft"

dataset:
  path: "/galamsey/data/unified_v4_1_multitask/galamsey_unified_v4_1_multitask_train.jsonl"
  type: "vlm_sft"
  test_size: 0.01
  image_root: "/galamsey/data/unified_v4_1_multitask/images"

training_config:
  extends: "DEFAULT_VLM_SFT"
  num_train_epochs: 15
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 2e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  eval_on_start: true
  eval_strategy: "epoch"
  save_strategy: "epoch"
  logging_steps: 5

peft_config:
  extends: "DEFAULT_VLM_LORA"
  use_peft: true
  r: 16
  lora_alpha: 32

benchmarks:
  max_new_tokens: 32
  image_root: "/galamsey/data/unified_v2/images"
  benchmarks:
    - name: "unified_v4_1_action_bleu"
      path: "/galamsey/data/unified_v2/galamsey_unified_v2_eval.jsonl"
      metric: "bleu"
      max_new_tokens: 32
      limit: 200

modal:
  app_name: "galamsey-unified-v4-1-multitask"
  gpu: "H100"
  timeout: 7200
  output_volume: "galamsey"
  output_dir: "/galamsey"
  detach: false
