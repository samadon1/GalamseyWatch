# GalamseyWatch v4 — RGB composite ablation.
#
# Tests whether the pretrained VLM performs better on in-distribution RGB
# (bands 2,1,0) vs the out-of-distribution SWIR2-SWIR1-NIR (bands 9,8,6)
# used in v1/v2. The SmallMinesDS paper's own Table I suggests pretrained
# models favor RGB — this run tests if that holds for VLMs too.
#
# Identical to v2 except:
#   - Composite: RGB (red, green, blue) instead of SWIR2-SWIR1-NIR
#   - Prompt: "RGB satellite image" instead of "SWIR false-color composite"
#   - Data path: /galamsey/data/v4/
#   - Uses the cheap eval config (eval_strategy: steps, eval_steps: 999999)
#
# Expected cost: ~$1.80 (cheap eval, no mid-epoch benchmark cycles)
#
# Invoke from the leap-finetune clone directory:
#     cd training/reference/leap-finetune
#     uv run leap-finetune /Users/mac/Downloads/GalamseyWatch/training/configs/galamsey_v4_rgb_modal.yaml

project_name: "galamsey-v4-rgb"
model_name: "lfm2.5-VL-450M"
training_type: "vlm_sft"

dataset:
  path: "/galamsey/data/v4/galamsey_v4_multitask_train.jsonl"
  type: "vlm_sft"
  test_size: 0.01
  image_root: "/galamsey/data/v4/images"

training_config:
  extends: "DEFAULT_VLM_SFT"
  num_train_epochs: 3
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 2e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  eval_on_start: true
  eval_strategy: "steps"           # cheap eval — only eval_on_start fires
  eval_steps: 999999
  save_strategy: "epoch"
  logging_steps: 10

peft_config:
  extends: "DEFAULT_VLM_LORA"
  use_peft: false

benchmarks:
  max_new_tokens: 256
  image_root: "/galamsey/data/v4/images"
  benchmarks:
    - name: "galamsey_description"
      path: "/galamsey/data/v4/galamsey_v4_description_eval.jsonl"
      metric: "bleu"
      max_new_tokens: 256
      limit: 300

    - name: "galamsey_grounding_iou50"
      path: "/galamsey/data/v4/galamsey_v4_grounding_eval.jsonl"
      metric: "grounding_iou"
      iou_threshold: 0.5
      max_new_tokens: 256
      limit: 300

    - name: "galamsey_grounding_iou25"
      path: "/galamsey/data/v4/galamsey_v4_grounding_eval.jsonl"
      metric: "grounding_iou"
      iou_threshold: 0.25
      max_new_tokens: 256
      limit: 300

modal:
  app_name: "galamsey-v4-rgb"
  gpu: "H100"
  timeout: 7200
  output_volume: "galamsey"
  output_dir: "/galamsey"
  detach: false
